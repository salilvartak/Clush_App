workflows:
  flutter-android-ios-build:
    name: Flutter Android & iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      groups:
        # Create these groups in the Codemagic UI under Environment variables -> Variable groups.
        - google_play_credentials # Defines $GCP_SERVICE_ACCOUNT
        - android_signing         # Defines $CM_KEYSTORE, $CM_KEYSTORE_PASSWORD, $CM_KEY_PASSWORD, $CM_KEY_ALIAS
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android App Bundle
        script: |
          # Use Codemagic's $BUILD_NUMBER to automatically increment version codes
          flutter build appbundle --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      google_play:
        # Provide your base64-encoded Service Account JSON as an environment variable in Codemagic
        credentials: $GCP_SERVICE_ACCOUNT
        track: internal # Can be changed to: alpha, beta, production
      # email:
      #   recipients:
      #     - your_email@example.com
      #   notify:
      #     success: true
      #     failure: true
